<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #0f1117; font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; }
        .login-card { background:#161b27; border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:2.5rem; width:100%; max-width:420px; }
        .login-logo { font-size:2rem; font-weight:800; color:#fff; }
        .form-control { background:#0f1117; border:1px solid rgba(255,255,255,.1); color:#e2e8f0; border-radius:10px; padding:.75rem 1rem; }
        .form-control:focus { background:#0f1117; border-color:#6366f1; color:#e2e8f0; box-shadow:0 0 0 3px rgba(99,102,241,.15); }
        .form-label { color:rgba(255,255,255,.7); font-size:.9rem; font-weight:500; }
        .btn-login { background: linear-gradient(135deg,#6366f1,#8b5cf6); border:none; border-radius:10px; padding:.75rem; font-weight:600; letter-spacing:.03em; transition:all .3s; }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(99,102,241,.4); }
        .input-icon { position:relative; }
        .input-icon i { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.3); z-index:5; }
        .input-icon .form-control { padding-left:2.75rem; }
        .toggle-password { position:absolute; right:1rem; top:50%; transform:translateY(-50%); cursor:pointer; color:rgba(255,255,255,.3); z-index:5; }
        .toggle-password:hover { color:#6366f1; }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index:9999;width:400px;">
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show shadow">
                {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
            <div class="login-card">
                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="login-logo mb-2">
                        <span style="color:#6366f1;">&lt;</span>Admin<span style="color:#6366f1;">/&gt;</span>
                    </div>
                    <p class="text-muted mb-0">Masuk ke Dashboard Portfolio</p>
                </div>

                <!-- Form -->
                <form action="{{ url_for('login') }}" method="POST" id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-icon">
                            <i class="bi bi-person"></i>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Masukkan username" required autofocus autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-icon position-relative">
                            <i class="bi bi-lock"></i>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Masukkan password" required autocomplete="current-password">
                            <span class="toggle-password" onclick="togglePassword()">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk Dashboard
                    </button>
                </form>

                <!-- Hint -->
                <div class="text-center mt-4">
                    <small class="text-muted">
                        <i class="bi bi-info-circle me-1"></i>Demo: <code>admin</code> / <code>admin123</code>
                    </small>
                </div>
                <div class="text-center mt-3">
                    <a href="{{ url_for('index') }}" class="text-muted text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i>Kembali ke Website
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
